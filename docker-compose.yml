version: '3.8'

services:
  navapp:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./navapp.db:/app/navapp.db
    environment:
      - SECRET_KEY=your-secret-key-change-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
