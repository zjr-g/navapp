<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>登录 - NavApp</title>
    <style>
        :root { --bg: #f5f5f5; --card-bg: white; --text: #333; --text-secondary: #666; --border: #ddd; --primary: #4a90d9; --primary-hover: #3a7bc8; --danger: #e74c3c; --shadow: rgba(0,0,0,0.1); }
        [data-theme="dark"] { --bg: #1a1a2e; --card-bg: #16213e; --text: #e0e0e0; --text-secondary: #a0a0a0; --border: #2a2a4a; --primary: #5b9bd5; --primary-hover: #4a8bc5; --danger: #e74c3c; --shadow: rgba(0,0,0,0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px var(--shadow); width: 100%; max-width: 360px; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: var(--text); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 14px; }
        input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; background: var(--card-bg); color: var(--text); }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--primary-hover); }
        .error { color: var(--danger); font-size: 14px; margin-bottom: 1rem; text-align: center; display: none; }
        .switch { text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 14px; }
        .switch a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>登录</h1>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">登录</button>
        </form>
        <div class="switch">
            还没有账号? <a href="/register">立即注册</a>
        </div>
    </div>
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        // Token 管理函数（与 dashboard.html 保持一致）
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }
        
        function isTokenExpired(token) {
            const payload = parseJwt(token);
            if (!payload || !payload.exp) return true;
            return payload.exp * 1000 < Date.now() + 5 * 60 * 1000;
        }
        
        // 检查现有 token 是否有效
        const token = localStorage.getItem('token');
        if (token && !isTokenExpired(token)) {
            window.location.href = '/dashboard';
        } else if (token) {
            // Token 已过期，清除
            localStorage.removeItem('token');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(formData.get('username'))}&password=${encodeURIComponent(formData.get('password'))}`
                });
                if (!res.ok) {
                    const data = await res.json();
                    errorEl.textContent = data.detail || '登录失败';
                    errorEl.style.display = 'block';
                    return;
                }
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                window.location.href = '/dashboard';
            } catch (err) {
                errorEl.textContent = '网络错误';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
