<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>登录 - NavApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-size: 14px; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #4a90d9; }
        button { width: 100%; padding: 0.75rem; background: #4a90d9; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #3a7bc8; }
        .error { color: #e74c3c; font-size: 14px; margin-bottom: 1rem; text-align: center; display: none; }
        .switch { text-align: center; margin-top: 1rem; color: #666; font-size: 14px; }
        .switch a { color: #4a90d9; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>登录</h1>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">登录</button>
        </form>
        <div class="switch">
            还没有账号? <a href="/register">立即注册</a>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (token) window.location.href = '/dashboard';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(formData.get('username'))}&password=${encodeURIComponent(formData.get('password'))}`
                });
                if (!res.ok) {
                    const data = await res.json();
                    errorEl.textContent = data.detail || '登录失败';
                    errorEl.style.display = 'block';
                    return;
                }
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                window.location.href = '/dashboard';
            } catch (err) {
                errorEl.textContent = '网络错误';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
